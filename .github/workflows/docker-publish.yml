name: Build and Push to GHCR

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          AUTO_NOTES="$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/releases/generate-notes" \
            -f tag_name="${TAG_NAME}" \
            --jq .body || true)"
          cat > release-notes.md <<EOF
          ## Docker image

          \`\`\`bash
          docker pull ghcr.io/${REPO}:${VERSION}
          \`\`\`

          Run:

          \`\`\`bash
          docker run --name drawdb-mcp -p 8080:80 -p 3000:3000 --restart unless-stopped ghcr.io/${REPO}:${VERSION}
          \`\`\`

          See the [README](https://github.com/${REPO}/blob/main/README.md) for advanced usage.

          ---

          ${AUTO_NOTES}
          EOF
          gh release create "$TAG_NAME" --notes-file release-notes.md --latest
