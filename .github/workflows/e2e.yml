name: E2E Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for e2e
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: drawdb-mcp:e2e-${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha,scope=e2e
          cache-to: type=gha,scope=e2e,mode=max

      - name: Install Playwright browsers
        run: pnpm --filter @drawdb-mcp/e2e exec playwright install chromium --with-deps

      - name: Run e2e tests
        env:
          DRAWDB_E2E_IMAGE: drawdb-mcp:e2e-${{ github.sha }}
        run: pnpm test:e2e:ci

      - name: Upload container logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-logs-${{ github.sha }}
          path: /tmp/drawdb-e2e-*.log
          if-no-files-found: ignore
